<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Случайный пользователь 🌎</title>
        <link rel="stylesheet" href="styles.css" />
        <!-- Подключаем стили -->
        <style>
            :root	{
            							--primary-color: #007bff;
            							--secondary-color: #6c757d;
            							--background-color: #f8f9fa;
            							--text-color: #212529;
            							--border-radius: 5px;
            							--border:1px solid #ddd;
            							-- box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            			}
               body {
                   font-family: Arial, sans-serif;
                   text-align: center;
                   margin: 50px;
               }

               button {
                   padding: 10px 20px;
                   font-size: 16px;
                   cursor: pointer;
                   border: none;
                   background-color:	var(--primary-color);

                   color: white;
                   border-radius: 5px;
               }

               button:hover {
                   background-color: var(--secondary-color);
               }

               #userInfo {
                   margin-top: 20px;
                   padding: 15px;
                   background:	var(--background-color);
                   border-radius: 10px;
                   display: inline-block;
               }
               .container {
                   max-width: 400px;
                   margin: auto;
                   padding: 20px;
                   border:	var(--border);
                   border-radius: 10px;
                   box-shadow:	var(--box-shadow);

            							background-color: white;
               }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>👤 Получить случайного пользователя</h2>
            <button id="getUserBtn">🔄 Получить пользователя</button>

            <div id="userInfo">
                <p>Здесь появится информация...</p>
            </div>
        </div>

        <script src="script.js"></script>
        <!-- Подключаем JS -->
        <script>
            // 1️⃣ Получаем элементы из DOM
            //getUserBtn это	кнопка, userInfo это блок для вывода информации
            const getUserBtn = document.querySelector("#getUserBtn");

            //	Блок для вывода информации о пользователе
            const userInfo = document.querySelector("#userInfo");

            // 2️⃣ Создаём асинхронную функцию для запроса данных
            //что происходит	при нажатии на кнопку получить пользователя
            //async - функция будет работать асинхронно, что позволяет использовать await внутри неё

            async function fetchUser() {
                //	Показываем индикатор загрузки
                userInfo.innerHTML = "<p>⏳ Загрузка...</p>";
                //	try...catch для обработки ошибок
                try {
                    // Делаем запрос к API
                    //fetch - встроенная функция для выполнения HTTP-запросов
                    //await - ожидание завершения промиса (в данном случае ответа от fetch)
                    const response = await fetch("https://randomuser.me/api/");
                    //	Проверяем успешность ответа
                    const data = await response.json();

                    // Достаём нужные данные
                    const user = data.results[0];
                    const name = `${user.name.first} ${user.name.last}`;
                    const country = user.location.country;
                    const email = user.email;
                    const avatar = user.picture.large;

                    //  Выводим данные на страницу
                    userInfo.innerHTML = `
            <img src="${avatar}" alt="Аватар" style="border-radius: 50%;">
            <p><strong>Имя:</strong> ${name}</p>
            <p><strong>Страна:</strong> ${country}</p>
            <p><strong>Email:</strong> ${email}</p>
        `;
                } catch (error) {
                    userInfo.innerHTML = "<p>❌ Ошибка при загрузке данных</p>";
                }
            }

            // 3️⃣ Добавляем обработчик события на кнопку
            //
            getUserBtn.addEventListener("click", fetchUser);
        </script>
    </body>
</html>
